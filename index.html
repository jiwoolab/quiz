<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 퀴즈 | 초등 3학년</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  #app { width: 100%; max-width: 520px; }

  .header { text-align: center; margin-bottom: 1.5rem; }
  .badge {
    display: inline-block;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 99px;
    font-size: 12px;
    color: #666;
    padding: 4px 14px;
    margin-bottom: 8px;
  }
  .title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; }

  .progress-bar-wrap {
    background: #e5e5e5;
    border-radius: 99px;
    height: 7px;
    margin: 1rem 0 1.25rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 7px;
    border-radius: 99px;
    background: #1D9E75;
    transition: width 0.4s ease;
  }

  .stat-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .stat {
    flex: 1;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  .stat-num.correct { color: #1D9E75; }
  .stat-num.wrong { color: #e05252; }
  .stat-label { font-size: 11px; color: #999; margin-top: 3px; }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .q-meta {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .q-text {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 1.5rem;
    text-align: center;
    line-height: 1.4;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .opt {
    background: #f8f8f7;
    border: 1.5px solid #e8e8e8;
    border-radius: 12px;
    padding: 18px 10px;
    font-size: 18px;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .opt:hover { border-color: #bbb; background: #fff; }
  .opt.correct {
    background: #e1f5ee;
    border-color: #1D9E75;
    color: #085041;
  }
  .opt.wrong {
    background: #fdeaea;
    border-color: #e05252;
    color: #8b1a1a;
  }
  .opt:disabled { cursor: not-allowed; }

  .feedback {
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    margin-top: 1.25rem;
    min-height: 22px;
    color: #aaa;
  }
  .feedback.ok { color: #0F6E56; }
  .feedback.ng { color: #c0392b; }

  .next-btn {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 14px;
    background: #1a1a1a;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .next-btn:disabled {
    background: #ddd;
    color: #aaa;
    cursor: not-allowed;
  }
  .next-btn:not(:disabled):hover { opacity: 0.85; }

  .finish-card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 16px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .finish-emoji { font-size: 48px; margin-bottom: 12px; }
  .finish-score { font-size: 48px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .finish-label { font-size: 15px; color: #888; margin-bottom: 1.75rem; }
  .finish-msg { font-size: 16px; font-weight: 600; color: #1D9E75; margin-bottom: 1.5rem; }
  .restart-btn {
    background: #1a1a1a;
    border: none;
    border-radius: 12px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
  }
  .restart-btn:hover { opacity: 0.85; }

  @media (max-width: 400px) {
    .q-text { font-size: 22px; }
    .opt { font-size: 16px; padding: 14px 8px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="badge">초등 3학년 수학 · 중간 수준</div>
    <div class="title">수학 퀴즈 🧮</div>
    <div class="subtitle" id="q-counter">1 / 10 문제</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="prog" style="width:10%"></div>
  </div>

  <div class="stat-row">
    <div class="stat">
      <div class="stat-num correct" id="s-correct">0</div>
      <div class="stat-label">✅ 정답</div>
    </div>
    <div class="stat">
      <div class="stat-num wrong" id="s-wrong">0</div>
      <div class="stat-label">❌ 오답</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s-remain">10</div>
      <div class="stat-label">📝 남은 문제</div>
    </div>
  </div>

  <div class="card" id="quiz-card">
    <div class="q-meta" id="q-type"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" disabled>다음 문제 →</button>
  </div>

  <div id="finish-area" style="display:none">
    <div class="finish-card">
      <div class="finish-emoji" id="finish-emoji">🎉</div>
      <div class="finish-score" id="final-score"></div>
      <div class="finish-label">10문제 중 정답</div>
      <div class="finish-msg" id="finish-msg"></div>
      <button class="restart-btn" onclick="restart()">🔄 다시 풀기</button>
    </div>
  </div>
</div>

<script>
const quizData = [
  {type:"덧셈", q:"243 + 156 = ?", a:399, wrong:[389,409,398]},
  {type:"뺄셈", q:"500 − 237 = ?", a:263, wrong:[273,253,362]},
  {type:"곱셈", q:"6 × 7 = ?",     a:42,  wrong:[40,43,48]},
  {type:"곱셈", q:"8 × 9 = ?",     a:72,  wrong:[70,63,81]},
  {type:"나눗셈",q:"56 ÷ 8 = ?",   a:7,   wrong:[6,8,9]},
  {type:"나눗셈",q:"81 ÷ 9 = ?",   a:9,   wrong:[7,8,10]},
  {type:"덧셈", q:"385 + 248 = ?", a:633, wrong:[623,643,532]},
  {type:"뺄셈", q:"1000 − 456 = ?",a:544, wrong:[554,534,646]},
  {type:"곱셈", q:"7 × 8 = ?",     a:56,  wrong:[54,58,63]},
  {type:"나눗셈",q:"72 ÷ 8 = ?",   a:9,   wrong:[7,8,10]}
];

let idx = 0, correct = 0, wrong = 0, answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function render() {
  const d = quizData[idx];
  document.getElementById('q-type').textContent = d.type;
  document.getElementById('q-text').textContent = d.q;
  document.getElementById('q-counter').textContent = (idx+1) + ' / ' + quizData.length + ' 문제';
  document.getElementById('prog').style.width = ((idx+1) / quizData.length * 100) + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').disabled = true;
  answered = false;

  const opts = shuffle([d.a, ...d.wrong]);
  const container = document.getElementById('opts');
  container.innerHTML = '';
  opts.forEach(v => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = v;
    b.onclick = () => pick(b, v, d.a);
    container.appendChild(b);
  });
}

function pick(btn, val, ans) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (val === ans) {
    btn.classList.add('correct');
    fb.textContent = '정답이에요! 잘했어요 ⭐';
    fb.className = 'feedback ok';
    correct++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b => {
      if (parseInt(b.textContent) === ans) b.classList.add('correct');
    });
    fb.textContent = '아쉬워요! 정답은 ' + ans + '이에요.';
    fb.className = 'feedback ng';
    wrong++;
  }

  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-remain').textContent = quizData.length - idx - 1;
  document.getElementById('next-btn').disabled = false;
}

document.getElementById('next-btn').onclick = () => {
  idx++;
  if (idx >= quizData.length) {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('finish-area').style.display = 'block';
    document.getElementById('final-score').textContent = correct + ' / ' + quizData.length;

    let emoji = '🌟', msg = '';
    if (correct === 10) { emoji = '🏆'; msg = '완벽해요! 모두 맞혔어요!'; }
    else if (correct >= 8) { emoji = '🎉'; msg = '정말 잘했어요!'; }
    else if (correct >= 6) { emoji = '😊'; msg = '잘 했어요! 한 번 더 도전해봐요!'; }
    else { emoji = '💪'; msg = '조금 더 연습해봐요. 할 수 있어요!'; }

    document.getElementById('finish-emoji').textContent = emoji;
    document.getElementById('finish-msg').textContent = msg;
  } else {
    render();
  }
};

function restart() {
  idx = 0; correct = 0; wrong = 0;
  document.getElementById('s-correct').textContent = 0;
  document.getElementById('s-wrong').textContent = 0;
  document.getElementById('s-remain').textContent = quizData.length;
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('finish-area').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
