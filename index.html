
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1.5rem 0; max-width: 520px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 1.5rem; }
.badge { display: inline-block; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 99px; font-size: 12px; color: var(--color-text-secondary); padding: 4px 12px; margin-bottom: 8px; }
.title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--color-text-secondary); }
.progress-bar-wrap { background: var(--color-background-secondary); border-radius: 99px; height: 6px; margin: 1rem 0 1.5rem; overflow: hidden; }
.progress-bar { height: 6px; border-radius: 99px; background: #1D9E75; transition: width 0.4s ease; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.q-meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
.q-text { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.25rem; text-align: center; line-height: 1.4; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px 10px; font-size: 15px; color: var(--color-text-primary); cursor: pointer; text-align: center; transition: all 0.15s; }
.opt:hover { border-color: var(--color-border-primary); background: var(--color-background-primary); }
.opt.correct { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
.opt.wrong { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
.feedback { text-align: center; font-size: 14px; margin-top: 1rem; min-height: 20px; color: var(--color-text-secondary); }
.feedback.ok { color: #0F6E56; }
.feedback.ng { color: var(--color-text-danger); }
.next-btn { display: block; width: 100%; margin-top: 1rem; padding: 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; color: var(--color-text-primary); cursor: pointer; text-align: center; }
.next-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.stat-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.stat { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.finish-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem; text-align: center; }
.finish-score { font-size: 40px; font-weight: 500; color: var(--color-text-primary); }
.finish-label { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.restart-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 24px; font-size: 14px; color: var(--color-text-primary); cursor: pointer; }
</style>
<div id="app">
  <div class="header">
    <div class="badge">초등 3학년 수학 · 중간 수준</div>
    <div class="title">수학 퀴즈</div>
    <div class="subtitle" id="q-counter">1 / 10 문제</div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="prog" style="width:10%"></div></div>
  <div class="stat-row">
    <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-label">정답</div></div>
    <div class="stat"><div class="stat-num" id="s-wrong">0</div><div class="stat-label">오답</div></div>
    <div class="stat"><div class="stat-num" id="s-remain">10</div><div class="stat-label">남은 문제</div></div>
  </div>
  <div class="card" id="quiz-card">
    <div class="q-meta" id="q-type"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" disabled>다음 문제 →</button>
  </div>
  <div id="finish-area" style="display:none">
    <div class="finish-card">
      <div class="finish-score" id="final-score"></div>
      <div class="finish-label">10문제 중 정답</div>
      <button class="restart-btn" onclick="restart()">다시 풀기</button>
    </div>
  </div>
</div>
<script>
const quizData = [
  {type:"덧셈",q:"243 + 156 = ?",a:399,wrong:[389,409,398]},
  {type:"뺄셈",q:"500 − 237 = ?",a:263,wrong:[273,253,362]},
  {type:"곱셈",q:"6 × 7 = ?",a:42,wrong:[40,43,48]},
  {type:"곱셈",q:"8 × 9 = ?",a:72,wrong:[70,63,81]},
  {type:"나눗셈",q:"56 ÷ 8 = ?",a:7,wrong:[6,8,9]},
  {type:"나눗셈",q:"81 ÷ 9 = ?",a:9,wrong:[7,8,10]},
  {type:"덧셈",q:"385 + 248 = ?",a:633,wrong:[623,643,532]},
  {type:"뺄셈",q:"1000 − 456 = ?",a:544,wrong:[554,534,646]},
  {type:"곱셈",q:"7 × 8 = ?",a:56,wrong:[54,58,63]},
  {type:"나눗셈",q:"72 ÷ 8 = ?",a:9,wrong:[7,8,10]}
];
let idx=0,correct=0,wrong=0,answered=false;
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function render(){
  const d=quizData[idx];
  document.getElementById('q-type').textContent=d.type;
  document.getElementById('q-text').textContent=d.q;
  document.getElementById('q-counter').textContent=(idx+1)+' / '+quizData.length+' 문제';
  document.getElementById('prog').style.width=((idx+1)/quizData.length*100)+'%';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').disabled=true;
  answered=false;
  const opts=shuffle([d.a,...d.wrong]);
  const container=document.getElementById('opts');
  container.innerHTML='';
  opts.forEach(v=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=v;
    b.onclick=()=>pick(b,v,d.a);
    container.appendChild(b);
  });
}
function pick(btn,val,ans){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  const fb=document.getElementById('feedback');
  if(val===ans){
    btn.classList.add('correct');
    fb.textContent='정답이에요! 잘했어요 ⭐';
    fb.className='feedback ok';
    correct++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b=>{if(parseInt(b.textContent)===ans)b.classList.add('correct');});
    fb.textContent='아쉬워요! 정답은 '+ans+'예요.';
    fb.className='feedback ng';
    wrong++;
  }
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
  document.getElementById('s-remain').textContent=quizData.length-idx-1;
  document.getElementById('next-btn').disabled=false;
}
document.getElementById('next-btn').onclick=()=>{
  idx++;
  if(idx>=quizData.length){
    document.getElementById('quiz-card').style.display='none';
    document.getElementById('finish-area').style.display='block';
    document.getElementById('final-score').textContent=correct+' / '+quizData.length;
  } else render();
};
function restart(){
  idx=0;correct=0;wrong=0;
  document.getElementById('s-correct').textContent=0;
  document.getElementById('s-wrong').textContent=0;
  document.getElementById('s-remain').textContent=quizData.length;
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('finish-area').style.display='none';
  render();
}
render();
</script>
